# Choix du compositeur / bureau — Roudix
---
mode: required
method: legacy
labels:
  step: "Desktop"
  step[fr]: "Bureau"

default: niri

items:
  - id: niri
    packages: []
    name: "Niri"
    description: "<html>
      <p><b>Niri</b> est le compositeur Wayland par défaut de Roudix. Basé sur un modèle de colonnes scrollables, il offre une expérience fluide et moderne.</p>
      <p>Recommandé pour la plupart des utilisateurs.</p>
      </html>"
    screenshot: "/run/current-system/sw/share/calamares/branding/roudix/images/niri.png"

  - id: hyprland
    packages: []
    name: "Hyprland"
    description: "<html>
      <p><b>Hyprland</b> est un compositeur Wayland très personnalisable avec animations fluides et support HDR. Idéal pour les utilisateurs avancés.</p>
      </html>"
    screenshot: "/run/current-system/sw/share/calamares/branding/roudix/images/hyprland.png"

  - id: gnome
    packages: []
    name: "GNOME"
    description: "<html>
      <p><b>GNOME</b> est un environnement de bureau classique, simple et stable. Bon choix pour les débutants sous Linux.</p>
      </html>"
    screenshot: "/run/current-system/sw/share/calamares/branding/roudix/images/gnome.png"

  - id: plasma
    packages: []
    name: "KDE Plasma"
    description: "<html>
      <p><b>KDE Plasma</b> est un environnement de bureau riche en fonctionnalités et très personnalisable, proche de l'expérience Windows.</p>
      </html>"
    screenshot: "/run/current-system/sw/share/calamares/branding/roudix/images/plasma.png"
