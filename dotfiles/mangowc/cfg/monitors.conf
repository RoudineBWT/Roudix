# ──────────────────────────────────────
# MONITORS
# ──────────────────────────────────────
# Identifie tes moniteurs avec : wlr-randr
# HKC 1080p@165  — moniteur gauche  (x=0)
# Legion 1440p@240 — moniteur droit (x=1920)
#
# Syntaxe: monitorrule=name:...,width:...,height:...,refresh:...,x:...,y:...,scale:...,vrr:...,rr:...
#
# IMPORTANT: MangoWC ne supporte pas le matching par description (desc:) comme Hyprland.
# Utilise le NOM du connecteur retourné par `wlr-randr` (ex: HDMI-A-1, DP-1, DP-2...).
# Remplace HKC_OUTPUT et LEGION_OUTPUT par les vrais noms de connecteurs chez toi.

monitorrule=name:DP-3,width:1920,height:1080,refresh:165,x:0,y:180,scale:1,vrr:0,rr:0
monitorrule=name:DP-1,width:2560,height:1440,refresh:240,x:1920,y:0,scale:1,vrr:1,rr:0
