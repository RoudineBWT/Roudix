# ──────────────────────────────────────
# APPEARANCE
# ──────────────────────────────────────

# Gaps (Hyprland: gaps_in=4, gaps_out=9)
gappih=4
gappiv=4
gappoh=9
gappov=9

# Border
borderpx=2
bordercolor=0x44444488
focuscolor=0x88888888

# Corner radius (Hyprland: rounding=20)
border_radius=20

# Cursor
cursor_size=32
cursor_theme=capitaine-cursors-white


# ──────────────────────────────────────
# WINDOW EFFECTS
# ──────────────────────────────────────

# Blur (Hyprland: size=6, passes=2)
blur=1
blur_optimized=1
blur_params_radius=6
blur_params_num_passes=2

# Shadows (Hyprland: range=15, render_power=3, color=rgba(00000066))
shadows=1
shadow_only_floating=1
shadows_size=15
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x00000066
