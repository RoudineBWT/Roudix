# ──────────────────────────────────────
# WINDOW RULES
# ──────────────────────────────────────

# ─── Discord → ws 4 (Chat), fixed size, floating ───
windowrule = workspace 4, float on, size 1316 1011, match:class ^(discord)$

# ─── Element → ws 4, fixed size, floating ───
windowrule = workspace 4, float on, size 1316 1011, match:class ^(Element)$

# ─── Telegram → ws 4, fixed size, top-right corner ───
windowrule = workspace 4, float on, size 555 1011, move ((monitor_w*1)-555) (0), match:class ^(org.telegram.desktop)$

# ─── Ghostty → ws 3 (Terminal), floating, fixed size ───
windowrule = workspace 3, float on, size 1505 755, center on, match:class ^(com.mitchellh.ghostty)$

# ─── Kitty → ws 3, floating ───
windowrule = workspace 3, float on, match:class ^(kitty)$

# ─── Ptyxis → ws 3 ───
windowrule = workspace 3, match:class ^(org.gnome.Ptyxis)$

# ─── Zen Browser → ws 1 (Browser), maximized ───
windowrule = workspace 1, maximize on, match:class ^(zen-twilight)$

# ─── Zen PiP → floating, pinned on top ───
windowrule = float on, pin on, match:class ^(zen-twilight)$, match:title ^(Picture-in-Picture)$

# ─── Zen About dialog → floating ───
windowrule = float on, match:class ^(zen-twilight)$, match:title ^(About Zen Twilight)$

# ─── Firefox → ws 1, maximized ───
windowrule = workspace 1, maximize on, match:class ^(firefox)$

# ─── Firefox PiP → floating, pinned on top ───
windowrule = float on, pin on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$

# ─── Firefox About dialog → floating ───
windowrule = float on, match:class ^(firefox)$, match:title ^(About Mozilla Firefox)$

# ─── Brave → ws 2 (Code), maximized ───
windowrule = workspace 2, maximize on, match:class ^(brave-browser)$

# ─── Zed → ws 2, maximized ───
windowrule = workspace 2, maximize on, match:class ^(dev.zed.Zed)$

# ─── Steam → ws 5 (Gaming), maximized ───
windowrule = workspace 5, maximize on, match:class ^(steam)$

# ─── Steam notification toasts → floating, bottom-right corner ───
windowrule = float on, move ((monitor_w*1)-320) ((monitor_h*1)-120), match:class ^(steam)$, match:title ^(notificationtoasts_.*)$

# ─── Steam Friends List → ws 5, floating ───
windowrule = workspace 5, float on, match:title ^(Friends List)$

# ─── Steam games → ws 5, fullscreen ───
windowrule = workspace 5, fullscreen on, match:class ^(steam_app_.*)$

# ─── Heroic → ws 5, fullscreen ───
windowrule = workspace 5, fullscreen on, match:class ^(heroic)$

# ─── Prism Launcher → ws 5, maximized ───
windowrule = workspace 5, maximize on, match:class ^(org.prismlauncher.PrismLauncher)$

# ─── Minecraft → ws 5, fullscreen ───
windowrule = workspace 5, fullscreen on, match:class ^(Minecraft.*)$

# ─── OpenRGB → ws 5 ───
windowrule = workspace 5, match:class ^(openrgb)$

# ─── Nautilus → ws 6 (Files), maximized ───
windowrule = workspace 6, maximize on, match:class ^(org.gnome.Nautilus)$

# ─── Nautilus file dialogs → floating (Save As, Open...) ───
windowrule = float on, match:class ^(org.gnome.Nautilus)$, match:title ^(Save As)$
windowrule = float on, match:class ^(org.gnome.Nautilus)$, match:title ^(Open)$

# ─── Text Editor → ws 6 ───
windowrule = workspace 6, match:class ^(org.gnome.TextEditor)$

# ─── Spotify → ws 7 (Music), maximized ───
windowrule = workspace 7, maximize on, match:class ^(spotify)$

# ─── EasyEffects → ws 7 ───
windowrule = workspace 7, match:class ^(com.github.wwmm.easyeffects)$
