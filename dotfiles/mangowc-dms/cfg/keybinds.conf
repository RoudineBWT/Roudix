# ──────────────────────────────────────────────────────────────────
#  Key Bindings
# ──────────────────────────────────────────────────────────────────

# Reload config
bind=SUPER+SHIFT,r,reload_config

# ─── Applications ───
bind=SUPER,Return,spawn,ghostty
bind=SUPER,d,spawn,dms ipc call spotlight toggle
bind=SUPER,b,spawn,zen-twilight
bind=SUPER+SHIFT,b,spawn,brave
bind=SUPER+ALT,l,spawn,dms ipc call lock lock
bind=SUPER,e,spawn,nautilus
bind=SUPER+SHIFT,q,spawn,dms ipc call powermenu toggle

# ─── Audio ───
bind=NONE,XF86AudioRaiseVolume,spawn,dms ipc call audio increment 3
bind=NONE,XF86AudioLowerVolume,spawn,dms ipc call audio decrement 3
bind=NONE,XF86AudioMute,spawn,dms ipc call audio mute
bind=NONE,XF86AudioMicMute,spawn,dms ipc call audio micmute

# ─── Media ───
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioNext,spawn,playerctl next

# ─── Window focus (hjkl + arrows) ───
bind=SUPER,h,focusdir,left
bind=SUPER,Left,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,Right,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,Up,focusdir,up
bind=SUPER,j,focusdir,down
bind=SUPER,Down,focusdir,down

# ─── Window move ───
bind=SUPER+CTRL,h,exchange_client,left
bind=SUPER+CTRL,Left,exchange_client,left
bind=SUPER+CTRL,l,exchange_client,right
bind=SUPER+CTRL,Right,exchange_client,right
bind=SUPER+CTRL,k,exchange_client,up
bind=SUPER+CTRL,Up,exchange_client,up
bind=SUPER+CTRL,j,exchange_client,down
bind=SUPER+CTRL,Down,exchange_client,down

# ─── Monitor focus ───
bind=SUPER+SHIFT,Left,focusmon,left
bind=SUPER+SHIFT,Right,focusmon,right
bind=SUPER+SHIFT,Up,focusmon,up
bind=SUPER+SHIFT,Down,focusmon,down

# ─── Move window to monitor ───
bind=SUPER+SHIFT+CTRL,Left,tagmon,left
bind=SUPER+SHIFT+CTRL,Right,tagmon,right
bind=SUPER+SHIFT+CTRL,Up,tagmon,up
bind=SUPER+SHIFT+CTRL,Down,tagmon,down

# ─── Resize / Width ───
bind=SUPER,minus,increase_proportion,-0.05
bind=SUPER,equal,increase_proportion,0.05
bind=SUPER+CTRL,f,set_proportion,1.0

# ─── Tags (= workspaces) ───
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

bind=SUPER+CTRL,1,tag,1
bind=SUPER+CTRL,2,tag,2
bind=SUPER+CTRL,3,tag,3
bind=SUPER+CTRL,4,tag,4
bind=SUPER+CTRL,5,tag,5
bind=SUPER+CTRL,6,tag,6
bind=SUPER+CTRL,7,tag,7
bind=SUPER+CTRL,8,tag,8
bind=SUPER+CTRL,9,tag,9

# ─── Layout ───
bind=SUPER,w,switch_layout
bind=SUPER,c,focuslast
bind=SUPER,o,toggleoverview
bind=SUPER,f,togglefullscreen
bind=SUPER,t,togglefloating
bind=SUPER,q,killclient

# ─── Screenshots ───
bind=CTRL+SHIFT,1,spawn,grim -g "$(slurp)" - | wl-copy
bind=CTRL+SHIFT,2,spawn,grim - | wl-copy
bind=CTRL+SHIFT,3,spawn,grim -g "$(slurp -o)" - | wl-copy

# ─── Scroll sur tags ───
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
axisbind=SUPER+CTRL,UP,tag,prev
axisbind=SUPER+CTRL,DOWN,tag,next

# ─── Quit ───
bind=CTRL+ALT,Delete,quit
bind=SUPER+SHIFT,p,spawn,wlr-dpms off

# ─── Mouse ───
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER,btn_middle,killclient
