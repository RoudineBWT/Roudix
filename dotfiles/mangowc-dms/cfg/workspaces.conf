# ──────────────────────────────────────
# TAG RULES (Workspaces)
# ──────────────────────────────────────
# Assignation des tags aux moniteurs.
#
#   󰈹  Browser   → tag 1  (Legion 1440p@240)
#      Code      → tag 2  (Legion)
#      Terminal  → tag 3  (HKC 1080p@165)
#      Chat      → tag 4  (Legion)
#   󰊗  Gaming    → tag 5  (Legion — VRR + 240Hz)
#   󰉋  Files     → tag 6  (Legion)
#   󰝚  Music     → tag 7  (HKC)
#      Misc      → tag 8  (HKC)

# ──────────────────────────────────────
# Legion (DP-1) : tags 1, 2, 4, 5, 6
# ──────────────────────────────────────

tagrule=id:1,monitor_name:DP-1,layout_name:monocle,no_hide:1
tagrule=id:2,monitor_name:DP-1,layout_name:monocle,no_hide:1
tagrule=id:4,monitor_name:DP-1,layout_name:tile

# Tag 5 Gaming — monocle pour que les jeux occupent tout l'écran
# no_hide:0 = le tag peut être masqué quand on switch (comportement normal)
tagrule=id:5,monitor_name:DP-1,layout_name:monocle

tagrule=id:6,monitor_name:DP-1,layout_name:monocle

# ──────────────────────────────────────
# HKC (DP-3) : tags 3, 7, 8
# ──────────────────────────────────────

tagrule=id:3,monitor_name:DP-3,layout_name:tile
tagrule=id:7,monitor_name:DP-3,layout_name:monocle
tagrule=id:8,monitor_name:DP-3,layout_name:tile
