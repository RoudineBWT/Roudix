# ──────────────────────────────────────
# MISCELLANEOUS
# ──────────────────────────────────────

# Système
xwayland_persistence=1
syncobj_enable=0

# Focus
focus_on_activate=1
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0

# Fenêtres
no_border_when_single=0
enable_floating_snap=1
snap_distance=50
drag_tile_to_tile=1
single_scratchpad=1
axis_bind_apply_timeout=100

# Layout switcher
circle_layout=tile,scroller

# Hotarea — overview en glissant la souris dans un coin
enable_hotarea=1
hotarea_size=10
ov_tab_mode=0
overviewgappi=5
overviewgappo=30
