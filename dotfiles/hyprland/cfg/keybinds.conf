# ──────────────────────────────────────
# KEYBINDINGS
# ──────────────────────────────────────
$mod = SUPER

# ─── Noctalia Shell ───
bind = $mod SHIFT, ESCAPE,      exec, noctalia-shell ipc call hotkeyOverlay toggle
bind = $mod SHIFT, Q,           exec, noctalia-shell ipc call sessionMenu toggle

# ─── Applications ───
bind = $mod,       RETURN,      exec, ghostty
bind = $mod,       D,           exec, noctalia-shell ipc call launcher toggle
bind = $mod,       B,           exec, zen-beta
bind = $mod SHIFT, B,           exec, brave
bind = $mod ALT,   L,           exec, noctalia-shell ipc call lockScreen lock
bind = $mod,       E,           exec, nautilus

# ─── Window management ───
bind = $mod,       Q,           killactive
bind = $mod,       F,           fullscreen, 0
bind = $mod,       T,           togglefloating
bind = $mod,       C,           centerwindow

# ─── Focus (HJKL + arrows) ───
bind = $mod,       H,           movefocus, l
bind = $mod,       LEFT,        movefocus, l
bind = $mod,       L,           movefocus, r
bind = $mod,       RIGHT,       movefocus, r
bind = $mod,       K,           movefocus, u
bind = $mod,       UP,          movefocus, u
bind = $mod,       J,           movefocus, d
bind = $mod,       DOWN,        movefocus, d

# ─── Move window ───
bind = $mod CTRL,  H,           movewindow, l
bind = $mod CTRL,  LEFT,        movewindow, l
bind = $mod CTRL,  L,           movewindow, r
bind = $mod CTRL,  RIGHT,       movewindow, r
bind = $mod CTRL,  K,           movewindow, u
bind = $mod CTRL,  UP,          movewindow, u
bind = $mod CTRL,  J,           movewindow, d
bind = $mod CTRL,  DOWN,        movewindow, d

# ─── Focus monitor ───
bind = $mod SHIFT, LEFT,        focusmonitor, l
bind = $mod SHIFT, RIGHT,       focusmonitor, r
bind = $mod SHIFT, UP,          focusmonitor, u
bind = $mod SHIFT, DOWN,        focusmonitor, d

# ─── Move window to monitor ───
bind = $mod SHIFT CTRL, LEFT,   movewindow, mon:l
bind = $mod SHIFT CTRL, RIGHT,  movewindow, mon:r
bind = $mod SHIFT CTRL, UP,     movewindow, mon:u
bind = $mod SHIFT CTRL, DOWN,   movewindow, mon:d

# ─── Resize window ───
bind = $mod,       MINUS,       resizeactive, -100 0
bind = $mod,       EQUAL,       resizeactive, 100 0
bind = $mod SHIFT, MINUS,       resizeactive, 0 -100
bind = $mod SHIFT, EQUAL,       resizeactive, 0 100

# ─── Move/resize floating windows with mouse ───
bindm = $mod,      mouse:272,   movewindow
bindm = $mod,      mouse:273,   resizewindow

# ─── Workspaces ───
bind = $mod,       1,           workspace, 1
bind = $mod,       2,           workspace, 2
bind = $mod,       3,           workspace, 3
bind = $mod,       4,           workspace, 4
bind = $mod,       5,           workspace, 5
bind = $mod,       6,           workspace, 6
bind = $mod,       7,           workspace, 7
bind = $mod,       8,           workspace, 8
bind = $mod,       9,           workspace, 9

# ─── Move window to workspace ───
bind = $mod CTRL,  1,           movetoworkspace, 1
bind = $mod CTRL,  2,           movetoworkspace, 2
bind = $mod CTRL,  3,           movetoworkspace, 3
bind = $mod CTRL,  4,           movetoworkspace, 4
bind = $mod CTRL,  5,           movetoworkspace, 5
bind = $mod CTRL,  6,           movetoworkspace, 6
bind = $mod CTRL,  7,           movetoworkspace, 7
bind = $mod CTRL,  8,           movetoworkspace, 8
bind = $mod CTRL,  9,           movetoworkspace, 9

# ─── Previous workspace ───
bind = $mod,       TAB,         workspace, previous

# ─── Scroll through workspaces ───
bind = $mod,       mouse_down,  workspace, e+1
bind = $mod,       mouse_up,    workspace, e-1

# ─── Screenshots (requires grimblast) ───
bind = CTRL SHIFT, 1,           exec, grimblast copy area
bind = CTRL SHIFT, 2,           exec, grimblast copy screen
bind = CTRL SHIFT, 3,           exec, grimblast copy active

# ─── Audio controls ───
bindel = , XF86AudioRaiseVolume, exec, noctalia-shell ipc call volume increase
bindel = , XF86AudioLowerVolume, exec, noctalia-shell ipc call volume decrease
bindl  = , XF86AudioMute,        exec, noctalia-shell ipc call volume muteOutput
bindl  = , XF86AudioMicMute,     exec, noctalia-shell ipc call volume muteInput

# ─── Media controls ───
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioPrev,        exec, playerctl previous
bindl  = , XF86AudioNext,        exec, playerctl next

# ─── Power ───
bind = $mod SHIFT, P,           dpms, off
bind = CTRL ALT,   Delete,      exit
