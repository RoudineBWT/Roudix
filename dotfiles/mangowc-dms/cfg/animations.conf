# ──────────────────────────────────────
# ANIMATIONS
# ──────────────────────────────────────
animations=1
layer_animations=1

# Types (slide pour windows/tags comme Hyprland)
animation_type_open=slide
animation_type_close=slide
layer_animation_type_open=slide
layer_animation_type_close=slide

# Fade
animation_fade_in=1
animation_fade_out=1
fadein_begin_opacity=0.0
fadeout_begin_opacity=1.0

# Durées (converties depuis les speeds Hyprland × ~100ms)
animation_duration_open=200
animation_duration_close=200
animation_duration_move=300
animation_duration_tag=300
animation_duration_focus=200

# Courbes bezier
# easeOutQuad  → 0.25,0.46,0.45,0.94
# easeOutCubic → 0.215,0.61,0.355,1.0
# spring       → 0.68,-0.55,0.265,1.55  (non supporté nativement, approximation)
animation_curve_open=0.25,0.46,0.45,0.94
animation_curve_close=0.215,0.61,0.355,1.0
animation_curve_move=0.68,0.0,0.265,1.55
animation_curve_tag=0.25,0.46,0.45,0.94
animation_curve_focus=0.25,0.46,0.45,0.94

# Direction des animations de tags (1=horizontal)
tag_animation_direction=1
