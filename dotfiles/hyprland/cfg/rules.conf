# ──────────────────────────────────────
# WINDOW RULES
# ──────────────────────────────────────

# ─── Discord → ws 4 (Chat), fixed size, floating ───
windowrule = workspace 4,    class:^(discord)$
windowrule = float,          class:^(discord)$
windowrule = size 1316 1011, class:^(discord)$

# ─── Element → ws 4, fixed size, floating ───
windowrule = workspace 4,    class:^(Element)$
windowrule = float,          class:^(Element)$
windowrule = size 1316 1011, class:^(Element)$

# ─── Telegram → ws 4, fixed size, top-right corner ───
windowrule = workspace 4,     class:^(org.telegram.desktop)$
windowrule = float,           class:^(org.telegram.desktop)$
windowrule = size 555 1011,   class:^(org.telegram.desktop)$
windowrule = move 100%-555 0, class:^(org.telegram.desktop)$

# ─── Ghostty → ws 3 (Terminal), floating, fixed size ───
windowrule = workspace 3,    class:^(com.mitchellh.ghostty)$
windowrule = float,          class:^(com.mitchellh.ghostty)$
windowrule = size 1505 755,  class:^(com.mitchellh.ghostty)$
windowrule = center,         class:^(com.mitchellh.ghostty)$

# ─── Kitty → ws 3, floating ───
windowrule = workspace 3,    class:^(kitty)$
windowrule = float,          class:^(kitty)$

# ─── Ptyxis → ws 3 ───
windowrule = workspace 3,    class:^(org.gnome.Ptyxis)$

# ─── Zen Browser → ws 1 (Browser), maximized ───
windowrule = workspace 1,    class:^(zen-twilight)$
windowrule = maximize,       class:^(zen-twilight)$

# ─── Zen PiP → floating, pinned on top ───
windowrule = float,          class:^(zen-twilight)$, title:^(Picture-in-Picture)$
windowrule = pin,            class:^(zen-twilight)$, title:^(Picture-in-Picture)$

# ─── Zen About dialog → floating ───
windowrule = float,          class:^(zen-twilight)$, title:^(About Zen Twilight)$

# ─── Firefox → ws 1, maximized ───
windowrule = workspace 1,    class:^(firefox)$
windowrule = maximize,       class:^(firefox)$

# ─── Firefox PiP → floating, pinned on top ───
windowrule = float,          class:^(firefox)$, title:^(Picture-in-Picture)$
windowrule = pin,            class:^(firefox)$, title:^(Picture-in-Picture)$

# ─── Firefox About dialog → floating ───
windowrule = float,          class:^(firefox)$, title:^(About Mozilla Firefox)$

# ─── Brave → ws 2 (Code), maximized ───
windowrule = workspace 2,    class:^(brave-browser)$
windowrule = maximize,       class:^(brave-browser)$

# ─── Zed → ws 2, maximized ───
windowrule = workspace 2,    class:^(dev.zed.Zed)$
windowrule = maximize,       class:^(dev.zed.Zed)$

# ─── Steam → ws 5 (Gaming), maximized ───
windowrule = workspace 5,    class:^(steam)$
windowrule = maximize,       class:^(steam)$

# ─── Steam notification toasts → floating, bottom-right corner ───
windowrule = float,                      class:^(steam)$, title:^(notificationtoasts_.*)$
windowrule = move 100%-320 100%-120,     class:^(steam)$, title:^(notificationtoasts_.*)$

# ─── Steam Friends List → ws 5, floating ───
windowrule = workspace 5,    title:^(Friends List)$
windowrule = float,          title:^(Friends List)$

# ─── Steam games → ws 5, fullscreen ───
windowrule = workspace 5,    class:^(steam_app_.*)$
windowrule = fullscreen,     class:^(steam_app_.*)$

# ─── Heroic → ws 5, fullscreen ───
windowrule = workspace 5,    class:^(heroic)$
windowrule = fullscreen,     class:^(heroic)$

# ─── Prism Launcher → ws 5, maximized ───
windowrule = workspace 5,    class:^(org.prismlauncher.PrismLauncher)$
windowrule = maximize,       class:^(org.prismlauncher.PrismLauncher)$

# ─── Minecraft → ws 5, fullscreen ───
windowrule = workspace 5,    class:^(Minecraft.*)$
windowrule = fullscreen,     class:^(Minecraft.*)$

# ─── OpenRGB → ws 5 ───
windowrule = workspace 5,    class:^(openrgb)$

# ─── Nautilus → ws 6 (Files), maximized ───
windowrule = workspace 6,    class:^(org.gnome.Nautilus)$
windowrule = maximize,       class:^(org.gnome.Nautilus)$

# ─── Nautilus file dialogs → floating (Save As, Open...) ───
windowrule = float,          class:^(org.gnome.Nautilus)$, title:^(Save As)$
windowrule = float,          class:^(org.gnome.Nautilus)$, title:^(Open)$

# ─── Text Editor → ws 6 ───
windowrule = workspace 6,    class:^(org.gnome.TextEditor)$

# ─── Spotify → ws 7 (Music), maximized ───
windowrule = workspace 7,    class:^(spotify)$
windowrule = maximize,       class:^(spotify)$

# ─── EasyEffects → ws 7 ───
windowrule = workspace 7,    class:^(com.github.wwmm.easyeffects)$
