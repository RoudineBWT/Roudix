# ──────────────────────────────────────
# INPUT — KEYBOARD
# ──────────────────────────────────────
xkb_rules_layout=us
xkb_rules_variant=intl
numlockon=1
repeat_rate=25
repeat_delay=600

# ──────────────────────────────────────
# INPUT — SOURIS
# ──────────────────────────────────────
accel_profile=1
accel_speed=0.0

# ──────────────────────────────────────
# INPUT — TOUCHPAD
# ──────────────────────────────────────
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
