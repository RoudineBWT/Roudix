<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradé fond -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81A1C1"></stop>
      <stop offset="100%" stop-color="#5E81AC"></stop>
    </linearGradient>

    <!-- Ombre douce -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"></feDropShadow>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bg)" filter="url(#shadow)"></rect>

  <!-- Anneau -->
  <circle cx="64" cy="64" r="34" fill="none" stroke="#E5E9F0" stroke-width="4" opacity="0.9"></circle>

  <!-- Noyau (kernel) -->
  <circle cx="64" cy="64" r="16" fill="#ECEFF4"></circle>

  <!-- Flèche gauche -->
  <path d="M64 30
           a34 34 0 0 1 26 14" fill="none" stroke="#A3BE8C" stroke-width="5" stroke-linecap="round"></path>
  <polygon points="94,48 86,48 90,40" fill="#A3BE8C"></polygon>

  <!-- Flèche droite -->
  <path d="M64 98
           a34 34 0 0 1 -26 -14" fill="none" stroke="#BF616A" stroke-width="5" stroke-linecap="round"></path>
  <polygon points="34,80 42,80 38,88" fill="#BF616A"></polygon>
</svg>