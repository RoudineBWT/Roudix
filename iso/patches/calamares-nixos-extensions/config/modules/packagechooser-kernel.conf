# Choix du kernel — Roudix
---
mode: required
method: legacy
labels:
  step: "Kernel"
  step[fr]: "Noyau"

default: cachyos-lts-lto-v3

items:
  - id: cachyos-lts-lto-v3
    packages: []
    name: "CachyOS LTS LTO v3 (Recommandé)"
    description: "<html>
      <p><b>CachyOS LTS LTO v3</b> — Kernel LTS optimisé avec LTO et instructions x86-64-v3. Meilleur compromis stabilité / performance pour la majorité des machines modernes (post-2013).</p>
      </html>"
    screenshot: "/run/current-system/sw/share/calamares/branding/roudix/images/kernel.png"

  - id: cachyos-lto-v3
    packages: []
    name: "CachyOS LTO v3"
    description: "<html>
      <p><b>CachyOS LTO v3</b> — Dernière version du kernel CachyOS avec LTO. Plus récent que le LTS, légèrement moins stable mais plus de fonctionnalités.</p>
      </html>"
    screenshot: "/run/current-system/sw/share/calamares/branding/roudix/images/kernel.png"

  - id: cachyos-lts-lto
    packages: []
    name: "CachyOS LTS LTO (compatibilité)"
    description: "<html>
      <p><b>CachyOS LTS LTO</b> — Version sans optimisations v3, compatible avec les machines plus anciennes (pré-2013 ou Atom/Celeron).</p>
      </html>"
    screenshot: "/run/current-system/sw/share/calamares/branding/roudix/images/kernel.png"

  - id: linux
    packages: []
    name: "Linux (nixpkgs)"
    description: "<html>
      <p><b>Linux</b> — Kernel standard de nixpkgs, sans optimisations CachyOS. Choix le plus compatible et conservateur.</p>
      </html>"
    screenshot: "/run/current-system/sw/share/calamares/branding/roudix/images/kernel.png"
