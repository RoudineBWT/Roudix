# ──────────────────────────────────────
# WINDOW RULES
# ──────────────────────────────────────

# ─── Discord → tag 4, flottant, taille fixe ───
windowrule=tags:4,isfloating:1,width:1316,height:1011,appid:^discord$

# ─── Element → tag 4, flottant, taille fixe ───
windowrule=tags:4,isfloating:1,width:1316,height:1011,appid:^Element$

# ─── Telegram → tag 4, flottant, taille fixe ───
windowrule=tags:4,isfloating:1,width:555,height:1011,appid:^org.telegram.desktop$

# ─── Ghostty → tag 3, flottant, taille fixe ───
windowrule=tags:3,isfloating:1,width:1505,height:755,appid:^com.mitchellh.ghostty$

# ─── Kitty → tag 3, flottant ───
windowrule=tags:3,isfloating:1,appid:^kitty$

# ─── Ptyxis → tag 3 ───
windowrule=tags:3,appid:^org.gnome.Ptyxis$

# ─── Zen Browser → tag 1 ───
windowrule=tags:1,isfullscreen:0,appid:^zen$

# ─── Zen PiP → flottant, global ───
windowrule=isfloating:1,isglobal:1,appid:^zen$,title:^Picture-in-Picture$

# ─── Zen About → flottant ───
windowrule=isfloating:1,appid:^zen$,title:^About Zen$

# ─── Firefox → tag 1 ───
windowrule=tags:1,appid:^firefox$

# ─── Firefox PiP → flottant, global ───
windowrule=isfloating:1,isglobal:1,appid:^firefox$,title:^Picture-in-Picture$

# ─── Firefox About → flottant ───
windowrule=isfloating:1,appid:^firefox$,title:^About Mozilla Firefox$

# ─── Brave → tag 2 ───
windowrule=tags:2,appid:^brave-browser$

# ─── Zed → tag 2 ───
windowrule=tags:2,appid:^dev.zed.Zed$

# ─────────────────────────────────────────────────────────────────
# GAMING — tag 5 (Legion 1440p@240, VRR + tearing)
# force_tearing:1 → bypass compositor, latence minimale
# indleinhibit_when_focus:1 → pas de screensaver pendant le jeu
# ─────────────────────────────────────────────────────────────────

# ─── Steam (launcher) → tag 5 ───
windowrule=tags:5,appid:^steam$

# ─── Steam notifications → flottant ───
windowrule=isfloating:1,appid:^steam$,title:^notificationtoasts_.*$

# ─── Steam Friends List → tag 5, flottant ───
windowrule=tags:5,isfloating:1,title:^Friends List$

# ─── Jeux Steam ───
windowrule=tags:5,isfullscreen:1,force_tearing:1,indleinhibit_when_focus:1,appid:^steam_app_.*$

# ─── Heroic ───
windowrule=tags:5,isfullscreen:1,force_tearing:1,indleinhibit_when_focus:1,appid:^heroic$

# ─── Prism Launcher ───
windowrule=tags:5,appid:^org.prismlauncher.PrismLauncher$

# ─── Minecraft ───
windowrule=tags:5,isfullscreen:1,force_tearing:1,indleinhibit_when_focus:1,appid:^Minecraft.*$

# ─── Lutris ───
windowrule=tags:5,appid:^net.lutris.Lutris$

# ─── Bottles ───
windowrule=tags:5,appid:^com.usebottles.bottles$

# ─── OpenRGB ───
windowrule=tags:5,appid:^openrgb$

# ─────────────────────────────────────────────────────────────────

# ─── Nautilus → tag 6 ───
windowrule=tags:6,appid:^org.gnome.Nautilus$

# ─── Nautilus dialogs → flottant ───
windowrule=isfloating:1,appid:^org.gnome.Nautilus$,title:^Save As$
windowrule=isfloating:1,appid:^org.gnome.Nautilus$,title:^Open$

# ─── Text Editor → tag 6 ───
windowrule=tags:6,appid:^org.gnome.TextEditor$

# ─── Spotify → tag 7 ───
windowrule=tags:7,appid:^spotify$

# ─── EasyEffects → tag 7 ───
windowrule=tags:7,appid:^com.github.wwmm.easyeffects$

# ─── slurp (screenshot) → pas de blur ni d'anim pour éviter les artefacts ───
windowrule=noblur:1,isnoanimation:1,appid:^slurp$
