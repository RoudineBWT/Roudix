<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">

  <!-- Main chip body -->
  <rect x="8" y="8" width="32" height="32" rx="6" fill="#1565c0"/>

  <!-- Inner chip face -->
  <rect x="11" y="11" width="26" height="26" rx="4" fill="#1976d2"/>

  <!-- Inner die -->
  <rect x="15" y="15" width="18" height="18" rx="3" fill="#1e88e5"/>

  <!-- Grid lines horizontal -->
  <line x1="17" y1="21" x2="31" y2="21" stroke="#90caf9" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="17" y1="24" x2="31" y2="24" stroke="#90caf9" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="17" y1="27" x2="31" y2="27" stroke="#90caf9" stroke-width="1" stroke-linecap="round" opacity="0.8"/>

  <!-- Grid lines vertical -->
  <line x1="21" y1="17" x2="21" y2="31" stroke="#90caf9" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="24" y1="17" x2="24" y2="31" stroke="#90caf9" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="27" y1="17" x2="27" y2="31" stroke="#90caf9" stroke-width="1" stroke-linecap="round" opacity="0.8"/>

  <!-- Scheduler arrow -->
  <path d="M 18 24 L 27 24 L 24 21 M 27 24 L 24 27" fill="none" stroke="#e3f2fd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pins top -->
  <rect x="12" y="4"  width="2.5" height="4" rx="0.8" fill="#0d47a1"/>
  <rect x="18" y="4"  width="2.5" height="4" rx="0.8" fill="#0d47a1"/>
  <rect x="24" y="4"  width="2.5" height="4" rx="0.8" fill="#0d47a1"/>
  <rect x="30" y="4"  width="2.5" height="4" rx="0.8" fill="#0d47a1"/>

  <!-- Pins bottom -->
  <rect x="12" y="40" width="2.5" height="4" rx="0.8" fill="#0d47a1"/>
  <rect x="18" y="40" width="2.5" height="4" rx="0.8" fill="#0d47a1"/>
  <rect x="24" y="40" width="2.5" height="4" rx="0.8" fill="#0d47a1"/>
  <rect x="30" y="40" width="2.5" height="4" rx="0.8" fill="#0d47a1"/>

  <!-- Pins left -->
  <rect x="4" y="12"  width="4" height="2.5" rx="0.8" fill="#0d47a1"/>
  <rect x="4" y="18"  width="4" height="2.5" rx="0.8" fill="#0d47a1"/>
  <rect x="4" y="24"  width="4" height="2.5" rx="0.8" fill="#0d47a1"/>
  <rect x="4" y="30"  width="4" height="2.5" rx="0.8" fill="#0d47a1"/>

  <!-- Pins right -->
  <rect x="40" y="12" width="4" height="2.5" rx="0.8" fill="#0d47a1"/>
  <rect x="40" y="18" width="4" height="2.5" rx="0.8" fill="#0d47a1"/>
  <rect x="40" y="24" width="4" height="2.5" rx="0.8" fill="#0d47a1"/>
  <rect x="40" y="30" width="4" height="2.5" rx="0.8" fill="#0d47a1"/>

  <!-- Scheduler indicator dot -->
  <circle cx="33" cy="15" r="3" fill="#ff7043"/>
  <circle cx="33" cy="15" r="1.5" fill="#ffccbc"/>

</svg>
