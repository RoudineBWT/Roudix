# ──────────────────────────────────────────────────────────────────
#  Window Rules
# ──────────────────────────────────────────────────────────────────

# Tags sur le bon moniteur
# Tag 1 (󰈹 browser) → écran Legion
tagrule=id:1,monitor_name:DP-1,layout_name:scroller

# Tag 2 ( terminal) → écran Legion
tagrule=id:2,monitor_name:DP-1,layout_name:scroller

# Tag 3 ( chat) → écran HKC
tagrule=id:3,monitor_name:DP-3,layout_name:scroller

# Tag 4 ( discord) → écran Legion
tagrule=id:4,monitor_name:DP-1,layout_name:scroller

# Tag 5 (󰊗 gaming) → écran Legion
tagrule=id:5,monitor_name:DP-1,layout_name:monocle

# Tag 6 (󰉋 files) → écran Legion
tagrule=id:6,monitor_name:DP-1,layout_name:scroller

# Tag 7 (󰝚 music) → écran HKC
tagrule=id:7,monitor_name:DP-3,layout_name:scroller

# Tag 8 ( misc) → écran HKC
tagrule=id:8,monitor_name:DP-3,layout_name:scroller

# Discord → tag 4, floating, taille fixe
windowrule=tags:4,isfloating:1,appid:discord
windowrule=tags:4,isfloating:1,appid:com.discordapp.Discord


# Element → tag 4, floating
windowrule=tags:4,isfloating:1,width:1316,height:1011,appid:Element

# Ghostty → floating
windowrule=isfloating:1,width:1505,height:755,appid:com.mitchellh.ghostty

# Kitty → tag 2, floating
windowrule=tags:2,isfloating:1,appid:kitty

# Telegram → tag 3, floating, taille fixe
windowrule=tags:3,isfloating:1,width:555,height:1011,appid:org.telegram.desktop

# Browsers → tag 1, maximize
windowrule=tags:1,isfullscreen:0,appid:firefox
windowrule=tags:1,isfullscreen:0,appid:zen-twilight
windowrule=tags:1,appid:brave
windowrule=tags:1,appid:brave-browser

# Firefox / Zen About → floating
windowrule=isfloating:1,appid:firefox,title:About Mozilla Firefox
windowrule=isfloating:1,appid:zen-twilight,title:About Zen Twilight

# Picture-in-Picture → floating
windowrule=isfloating:1,appid:firefox,title:Picture-in-Picture
windowrule=isfloating:1,appid:zen-twilight,title:Picture-in-Picture

# Zed → tag 2, maximize
windowrule=tags:2,appid:dev.zed.Zed

# Ptyxis → tag 2
windowrule=tags:2,appid:org.gnome.Ptyxis

# Steam → tag 5, maximize
windowrule=tags:5,appid:steam

# Steam notifications → floating bottom-right
windowrule=isfloating:1,offsetx:45,offsety:-45,appid:steam,title:notificationtoasts_.*_desktop

# Steam Friends List → tag 5, floating
windowrule=tags:5,isfloating:1,title:Friends List

# Games (steam_app_*) → tag 5, fullscreen
windowrule=tags:5,isfullscreen:1,appid:steam_app

# Heroic → tag 5, fullscreen
windowrule=tags:5,isfullscreen:1,appid:heroic

# PrismLauncher → tag 5
windowrule=tags:5,appid:org.prismlauncher.PrismLauncher

# Minecraft → tag 5, fullscreen
windowrule=tags:5,isfullscreen:1,appid:Minecraft

# OpenRGB → tag 5
windowrule=tags:5,appid:openrgb

# Nautilus → tag 6
windowrule=tags:6,appid:org.gnome.Nautilus

# Nautilus Save/Open dialogs → floating, focused
windowrule=isfloating:1,appid:org.gnome.Nautilus,title:(Open|Save As)

# GNOME Text Editor → tag 6
windowrule=tags:6,appid:org.gnome.TextEditor

# Spotify → tag 7
windowrule=tags:7,appid:spotify

# EasyEffects → tag 7
windowrule=tags:7,appid:com.github.wwmm.easyeffects
