# SPDX-License-Identifier: CC0-1.0
# Choix du kernel — Roudix
# La micro-architecture (v3/v4/zen4) est détectée et ajoutée automatiquement
# par nixos.py — ici on choisit seulement la famille de kernel.
---
mode: required
method: legacy
labels:
  step: "Kernel"
  step[fr]: "Noyau"

default: cachyos-lts

items:
  - id: cachyos-lts
    packages: []
    name: "CachyOS LTS (Recommandé)"
    description: "<html>
      <p><b>CachyOS LTS</b> — Kernel optimisé basé sur la branche LTS du noyau Linux. Le meilleur compromis stabilité / performance pour la majorité des utilisateurs.</p>
      <p>La meilleure variante d'optimisation processeur (v3, v4 ou Zen4) est détectée et appliquée automatiquement.</p>
      </html>"

  - id: cachyos-latest
    packages: []
    name: "CachyOS Latest"
    description: "<html>
      <p><b>CachyOS Latest</b> — Dernière version du noyau Linux avec les optimisations CachyOS. Plus de fonctionnalités récentes, légèrement moins stable que la LTS.</p>
      </html>"

  - id: cachyos-bore
    packages: []
    name: "CachyOS BORE"
    description: "<html>
      <p><b>CachyOS BORE</b> — Scheduler BORE, axé réactivité pour le bureau et le gaming.</p>
      </html>"

  - id: cachyos-eevdf
    packages: []
    name: "CachyOS EEVDF"
    description: "<html>
      <p><b>CachyOS EEVDF</b> — Scheduler EEVDF, équilibre entre latence et débit.</p>
      </html>"

  - id: cachyos-hardened
    packages: []
    name: "CachyOS Hardened"
    description: "<html>
      <p><b>CachyOS Hardened</b> — Version durcie côté sécurité, recommandée si la sécurité prime sur la performance.</p>
      </html>"
