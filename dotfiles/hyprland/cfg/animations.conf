# ──────────────────────────────────────
# ANIMATIONS
# ──────────────────────────────────────
animations {
    enabled = true

    # Custom bezier curves
    bezier = easeOutQuad,   0.25, 0.46, 0.45, 0.94
    bezier = easeOutCubic,  0.215, 0.61, 0.355, 1.0
    bezier = spring,        0.68, -0.55, 0.265, 1.55

    # Windows
    animation = windowsIn,   1, 2, easeOutQuad,  slide
    animation = windowsOut,  1, 2, easeOutCubic, slide
    animation = windowsMove, 1, 3, spring

    # Workspaces
    animation = workspaces,  1, 3, easeOutQuad,  slide

    # Fade
    animation = fadeIn,      1, 2, easeOutQuad
    animation = fadeOut,     1, 2, easeOutCubic
    animation = fadeSwitch,  1, 2, easeOutQuad
    animation = fadeShadow,  1, 2, easeOutQuad
    animation = fadeDim,     1, 2, easeOutQuad

    # Borders
    animation = border,      1, 5, default
}
